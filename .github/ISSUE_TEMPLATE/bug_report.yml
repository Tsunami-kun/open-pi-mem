name: Bug report
description: Report a reproducible bug or regression
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Command, config, data source, and exact steps to reproduce.
      placeholder: |
        python3 scripts/run_high_level_inference.py ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, GPU/CPU, and relevant package versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or trace
      description: Paste the relevant error output or traceback.
    validations:
      required: true
