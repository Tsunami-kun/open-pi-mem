name: Feature request
description: Suggest a new feature, improvement, or packaging enhancement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Mention related scripts, configs, datasets, or viewer workflows if relevant.
