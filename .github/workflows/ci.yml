name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[eval]"

      - name: Compile source files
        run: python -m compileall src scripts

      - name: Check package version
        run: python -m open_pi_mem.cli --version

      - name: Check script entrypoints
        run: |
          python scripts/run_high_level_inference.py --help
          python scripts/run_rmbench_eval.py --help
          python scripts/run_rmbench_high_level_episode_gemini_sdk_video.py --help
          python scripts/run_test_viewer_app.py --help
          python scripts/prepare_open_dataset.py --help
